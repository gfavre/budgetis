networks:
  budgetis:
    external: false
  web:
    external: true

services:
  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --worker-tmp-dir /dev/shm
    entrypoint: [ "/app/docker/entrypoint.sh" ]
    volumes:
      - ./budgetis:/app/budgetis
      - ./config:/app/config
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
      - HOME=/tmp
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.budgetis.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.budgetis.entrypoints=websecure"
      - "traefik.http.routers.budgetis.tls.certresolver=letsencrypt"
      - "traefik.http.services.budgetis.loadbalancer.server.port=8000"
    depends_on:
      - db
      - redis
    networks:
      - budgetis
      - web

  celery:
    build:
      context: .
      dockerfile: docker/celery.Dockerfile
    command: celery -A config.celery_app worker -l info
    volumes:
      - ./budgetis:/app/budgetis
      - ./config:/app/config
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
    depends_on:
      - db
      - redis
    networks:
      - budgetis

  celery-beat:
    build:
      context: .
      dockerfile: docker/celery.Dockerfile
    command: celery -A config.celery_app beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./budgetis:/app/budgetis
      - ./config:/app/config
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
    depends_on:
      - db
      - redis
    networks:
      - budgetis

  db:
    image: postgres:15
    command: postgres -c log_min_messages=WARNING -c log_min_duration_statement=-1
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - budgetis

  redis:
    image: redis:7
    command: redis-server --loglevel warning
    networks:
      - budgetis

volumes:
  postgres_data:
