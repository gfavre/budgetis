{% extends "base.html" %}

{% load static i18n %}

{% block content %}
  <div class="d-flex gap-3 align-items-center mb-3">
    <div class="d-flex align-items-center gap-2">
      <label class="form-label mb-0" for="year">{% trans "Year" %}</label>
      <select id="year" class="form-select form-select-sm w-auto">
        {% for y in available_years %}
          <option value="{{ y }}"{% if y == default_year %} selected{% endif %}>{{ y }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="form-check mb-0">
      <input id="is_budget" class="form-check-input" type="checkbox" />
      <label class="form-check-label" for="is_budget">{% trans "Budget" %}</label>
    </div>
  </div>
  <div id="chart" class="d-none" style="width:100%;height:75vh"></div>
  <div id="no-data" class="text-center text-muted py-5">{% trans "Données non disponibles." %}</div>
  <script type="module">
  const $ = (q) => document.querySelector(q);

  async function fetchBuckets() {
    const params = new URLSearchParams({
      year: $("#year").value,
      budget: $("#is_budget").checked,
    });
    const resp = await fetch("{% url 'finance:data_buckets' %}?" + params.toString(), {
      headers: { "X-Requested-With": "fetch" },
    });
    if (!resp.ok) return null;
    return resp.json();
  }

  async function drawBuckets() {
    const data = await fetchBuckets();
    const hasData = data && data.links && data.links.length > 0;
    Plotly.purge("chart");
    $("#chart").classList.toggle("d-none", !hasData);
    $("#no-data").classList.toggle("d-none", hasData);
    if (!hasData) return;

    const trace = {
      type: "sankey",
      arrangement: "snap",
      node: {
        label: data.nodes.map(n => n.name),
        color: data.node_colors,
        pad: 14,
        thickness: 22,
        line: { width: 0.5, color: "rgba(0,0,0,0.25)" },
        labelfont: { size: 18, color: "#111" },
        hoverinfo: "none",
      },
      link: {
        source: data.links.map(l => l.source),
        target: data.links.map(l => l.target),
        value: data.links.map(l => l.value),
        color: data.link_colors,
        hovertemplate: "%{value:' .0f} CHF<extra></extra>",
      },
    };

    Plotly.newPlot(
      "chart",
      [trace],
      { font: { size: 16, family: "var(--bs-body-font-family)" } },
      { responsive: true }
    );
  }

  $("#year").addEventListener("change", drawBuckets);
  $("#is_budget").addEventListener("change", drawBuckets);
  window.addEventListener("load", drawBuckets);
  </script>
{% endblock content %}
