{% load money i18n %}

<dl class="comments">
  {% for row in accounts %}
    {% with comments=row.account.comments.all %}
      {% if comments %}
        <dt>{{ row.account.full_code }}</dt>
        {% for comment in comments %}
          <dd class="ms-4">
            {{ comment.content }}
          </dd>
        {% endfor %}
      {% endif %}
    {% endwith %}
  {% endfor %}
</dl>
